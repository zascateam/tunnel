name: Build Tunnel for Windows

on:
  push:
    tags:
      - 'tunnel/v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        goos: [windows]
        goarch: [amd64, arm64]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tunnel/go.sum

      - name: Build
        working-directory: tunnel
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" \
            -o ../dist/zasca-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}.exe \
            ./cmd/tunnel/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: zasca-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/zasca-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}.exe
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/
          merge-multiple: true

      - name: Create SHA256 checksums
        working-directory: dist
        run: |
          sha256sum *.exe > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/checksums-sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
