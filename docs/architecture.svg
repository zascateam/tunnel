<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="900" height="480" rx="12" fill="url(#bg)"/>
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">ZASCA隧道 — 边缘代理架构</text>

  <!-- 云端区域 -->
  <rect x="30" y="55" width="400" height="400" rx="12" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.3"/>
  <text x="230" y="78" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">☁ 云端（网关服务器）</text>

  <!-- 边缘区域 -->
  <rect x="470" y="55" width="400" height="400" rx="12" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.3"/>
  <text x="670" y="78" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">🖥 边缘（Windows主机）</text>

  <!-- WSS服务 -->
  <g filter="url(#sh)">
    <rect x="60" y="100" width="160" height="80" rx="8" fill="url(#gw)"/>
    <text x="140" y="135" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">WSS服务</text>
    <text x="140" y="155" text-anchor="middle" fill="#bfdbfe" font-size="9">:9000 /tunnel</text>
  </g>

  <!-- RDP代理 -->
  <g filter="url(#sh)">
    <rect x="250" y="100" width="160" height="80" rx="8" fill="url(#gw)"/>
    <text x="330" y="135" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">RDP代理</text>
    <text x="330" y="155" text-anchor="middle" fill="#bfdbfe" font-size="9">:443 TLS</text>
  </g>

  <!-- 隧道客户端 -->
  <g filter="url(#sh)">
    <rect x="500" y="100" width="180" height="80" rx="8" fill="url(#edge)"/>
    <text x="590" y="130" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">边缘代理</text>
    <text x="590" y="150" text-anchor="middle" fill="#a7f3d0" font-size="9">WSS客户端 + 多路复用</text>
    <text x="590" y="165" text-anchor="middle" fill="#a7f3d0" font-size="8">Ed25519密钥交换</text>
  </g>

  <!-- Windows服务 -->
  <g filter="url(#sh)">
    <rect x="720" y="100" width="130" height="80" rx="8" fill="#334155"/>
    <text x="785" y="130" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Windows服务</text>
    <text x="785" y="148" text-anchor="middle" fill="#94a3b8" font-size="9">开机自启</text>
    <text x="785" y="165" text-anchor="middle" fill="#94a3b8" font-size="8">SYSTEM账户</text>
  </g>

  <!-- 通道多路复用器 -->
  <g filter="url(#sh)">
    <rect x="510" y="220" width="340" height="50" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1"/>
    <text x="680" y="250" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">通道多路复用器</text>
  </g>

  <!-- RDP通道 -->
  <g>
    <rect x="510" y="295" width="100" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="560" y="320" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">RDP</text>
    <text x="560" y="335" text-anchor="middle" fill="#64748b" font-size="8">0x01</text>
  </g>

  <!-- WinRM通道 -->
  <g>
    <rect x="630" y="295" width="100" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="680" y="320" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">WinRM</text>
    <text x="680" y="335" text-anchor="middle" fill="#64748b" font-size="8">0x02</text>
  </g>

  <!-- 远程执行通道 -->
  <g>
    <rect x="750" y="295" width="100" height="50" rx="6" fill="#3b0764" stroke="#8b5cf6" stroke-width="1"/>
    <text x="800" y="320" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">远程执行</text>
    <text x="800" y="335" text-anchor="middle" fill="#64748b" font-size="8">0x03</text>
  </g>

  <!-- 本地服务 -->
  <g>
    <rect x="510" y="375" width="100" height="50" rx="6" fill="#334155"/>
    <text x="560" y="400" text-anchor="middle" fill="#e2e8f0" font-size="10">RDP :3389</text>
  </g>
  <g>
    <rect x="630" y="375" width="100" height="50" rx="6" fill="#334155"/>
    <text x="680" y="400" text-anchor="middle" fill="#e2e8f0" font-size="10">WinRM :5986</text>
  </g>
  <g>
    <rect x="750" y="375" width="100" height="50" rx="6" fill="#334155"/>
    <text x="800" y="400" text-anchor="middle" fill="#e2e8f0" font-size="10">PowerShell</text>
  </g>

  <!-- WSS连接 -->
  <line x1="220" y1="140" x2="498" y2="140" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="360" y="133" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">WSS + Token + 公钥</text>

  <!-- 隧道→服务 -->
  <line x1="680" y1="180" x2="718" y2="140" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 隧道→多路复用 -->
  <line x1="590" y1="180" x2="590" y2="218" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- 多路复用→通道 -->
  <line x1="560" y1="270" x2="560" y2="293" stroke="#60a5fa" stroke-width="1" marker-end="url(#arrB)"/>
  <line x1="680" y1="270" x2="680" y2="293" stroke="#60a5fa" stroke-width="1" marker-end="url(#arrB)"/>
  <line x1="800" y1="270" x2="800" y2="293" stroke="#a78bfa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 通道→本地 -->
  <line x1="560" y1="345" x2="560" y2="373" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="680" y1="345" x2="680" y2="373" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="800" y1="345" x2="800" y2="373" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 心跳监控 -->
  <g>
    <rect x="60" y="220" width="160" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="140" y="245" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">心跳监控</text>
    <text x="140" y="260" text-anchor="middle" fill="#64748b" font-size="8">30秒间隔 / 90秒超时</text>
  </g>

  <!-- 自动重连 -->
  <g>
    <rect x="60" y="295" width="160" height="50" rx="6" fill="#065f46" stroke="#10b981" stroke-width="1"/>
    <text x="140" y="320" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">自动重连</text>
    <text x="140" y="335" text-anchor="middle" fill="#64748b" font-size="8">指数退避策略</text>
  </g>

  <!-- RDP客户端 -->
  <g>
    <rect x="60" y="375" width="160" height="50" rx="6" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
    <text x="140" y="400" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">RDP客户端</text>
    <text x="140" y="415" text-anchor="middle" fill="#64748b" font-size="8">mstsc → rdp-xxx.zasca.com</text>
  </g>
  <line x1="220" y1="400" x2="248" y2="155" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
</svg>
